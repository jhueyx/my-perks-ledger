<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="drBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2A4A"/>
      <stop offset="100%" stop-color="#080F22"/>
    </linearGradient>
    <linearGradient id="drRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C00020"/>
      <stop offset="100%" stop-color="#800010"/>
    </linearGradient>
    <radialGradient id="drSheen" cx="40%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#2A4A7A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#080F22" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#drBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#drSheen)"/>
  <!-- Delta triangle logo -->
  <g transform="translate(28, 22)" opacity="0.9">
    <polygon points="24,0 48,42 0,42" fill="url(#drRed)"/>
    <polygon points="24,8 40,36 8,36" fill="#1A2A4A" opacity="0.5"/>
  </g>
  <!-- Wing sweep accent -->
  <path d="M 100 60 Q 250 40 400 80" stroke="#C00020" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 100 68 Q 250 52 400 88" stroke="#C00020" stroke-width="0.8" fill="none" opacity="0.15"/>
  <!-- Delta wordmark -->
  <text x="28" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="3" opacity="0.9">DELTA</text>
  <text x="28" y="192" font-family="system-ui" font-size="10" font-weight="300" fill="rgba(180,200,240,0.7)" letter-spacing="4">SKYMILES RESERVE</text>
  <!-- Card number dots -->
  <text x="28" y="222" font-family="monospace" font-size="11" fill="rgba(180,200,240,0.25)" letter-spacing="3">•••• •••• •••• ••••</text>
  <text x="28" y="242" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.25)" letter-spacing="1">AMERICAN EXPRESS</text>
</svg>
