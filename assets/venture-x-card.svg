<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="vxBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C2333"/>
      <stop offset="100%" stop-color="#0D111C"/>
    </linearGradient>
    <radialGradient id="vxSheen" cx="25%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#3B4F7A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1C2333" stop-opacity="0"/>
    </radialGradient>
    <filter id="vxGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="400" height="252" rx="16" fill="url(#vxBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#vxSheen)"/>

  <!-- Star-field pattern (Venture X signature) -->
  <g opacity="0.55">
    <circle cx="310" cy="38" r="1.8" fill="#B8C8F0"/>
    <circle cx="340" cy="70" r="1.2" fill="#B8C8F0"/>
    <circle cx="370" cy="28" r="1.5" fill="#B8C8F0"/>
    <circle cx="295" cy="80" r="1.0" fill="#B8C8F0"/>
    <circle cx="385" cy="58" r="2.0" fill="#B8C8F0"/>
    <circle cx="358" cy="100" r="1.2" fill="#B8C8F0"/>
    <circle cx="322" cy="118" r="0.9" fill="#B8C8F0"/>
    <circle cx="380" cy="130" r="1.4" fill="#B8C8F0"/>
    <circle cx="348" cy="48" r="1.0" fill="#B8C8F0"/>
    <circle cx="275" cy="55" r="1.3" fill="#B8C8F0"/>
    <circle cx="400" cy="90" r="0.9" fill="#B8C8F0"/>
    <circle cx="265" cy="100" r="0.8" fill="#B8C8F0"/>
  </g>

  <!-- Diagonal accent line (Venture X design element) -->
  <line x1="220" y1="0" x2="400" y2="140" stroke="#3B5AAA" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="0" x2="400" y2="120" stroke="#3B5AAA" stroke-width="0.6" opacity="0.2"/>

  <!-- Capital One logo mark (simplified infinity/chevron) -->
  <g transform="translate(28, 28)">
    <path d="M14 9 C14 5.69 11.31 3 8 3 C4.69 3 2 5.69 2 9 C2 12.31 4.69 15 8 15 C9.5 15 10.87 14.43 11.9 13.5" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M18 9 C18 12.31 20.69 15 24 15 C27.31 15 30 12.31 30 9 C30 5.69 27.31 3 24 3 C22.5 3 21.13 3.57 20.1 4.5" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- VENTURE X wordmark -->
  <text x="28" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="4" opacity="0.95">VENTURE X</text>

  <!-- Card number dots -->
  <text x="28" y="214" font-family="monospace" font-size="11" fill="rgba(184,200,240,0.4)" letter-spacing="3">•••• •••• •••• ••••</text>

  <!-- Subtle bottom gradient overlay -->
  <rect x="0" y="200" width="400" height="52" rx="0" fill="url(#vxBg)" opacity="0.3"/>
  <rect x="0" y="236" width="400" height="16" rx="16" fill="url(#vxBg)" opacity="0.4"/>
</svg>
