<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="csBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00246A"/>
      <stop offset="100%" stop-color="#000E36"/>
    </linearGradient>
    <radialGradient id="csSheen" cx="60%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#0040A0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000E36" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#csBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#csSheen)"/>
  <!-- Citi arc logo (two overlapping arcs) -->
  <g transform="translate(28, 28)" opacity="0.9">
    <path d="M 0 20 A 20 20 0 0 1 40 20" fill="none" stroke="#E02030" stroke-width="4" stroke-linecap="round"/>
    <path d="M 8 28 A 20 20 0 0 0 48 28" fill="none" stroke="#0060C0" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Geometric strata layers accent -->
  <line x1="0" y1="90" x2="400" y2="90" stroke="#0060C0" stroke-width="0.6" opacity="0.2"/>
  <line x1="0" y1="98" x2="400" y2="98" stroke="#0060C0" stroke-width="0.4" opacity="0.15"/>
  <line x1="0" y1="104" x2="300" y2="104" stroke="#0060C0" stroke-width="0.3" opacity="0.12"/>
  <!-- Citi Strata wordmark -->
  <text x="28" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="white" letter-spacing="2" opacity="0.9">CITI</text>
  <text x="28" y="192" font-family="system-ui" font-size="11" font-weight="300" fill="rgba(160,190,240,0.75)" letter-spacing="4">STRATA PREMIER</text>
  <!-- Card number dots -->
  <text x="28" y="222" font-family="monospace" font-size="11" fill="rgba(160,190,240,0.25)" letter-spacing="3">•••• •••• •••• ••••</text>
</svg>
