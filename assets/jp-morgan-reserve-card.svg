<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="jmrBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002060"/>
      <stop offset="100%" stop-color="#000D30"/>
    </linearGradient>
    <linearGradient id="jmrGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="50%" stop-color="#F0CC66"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="jmrSheen" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#1A3A7A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000D30" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#jmrBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#jmrSheen)"/>
  <!-- Gold accent stripe -->
  <rect x="0" y="38" width="400" height="3" fill="url(#jmrGold)" opacity="0.9"/>
  <rect x="0" y="44" width="400" height="1" fill="url(#jmrGold)" opacity="0.4"/>
  <!-- Subtle diagonal lines -->
  <line x1="280" y1="0" x2="400" y2="100" stroke="#1A3A7A" stroke-width="1.5" opacity="0.3"/>
  <line x1="310" y1="0" x2="400" y2="60" stroke="#1A3A7A" stroke-width="0.8" opacity="0.2"/>
  <!-- JP Morgan Chase octagon mark (simplified) -->
  <g transform="translate(28, 58)">
    <polygon points="10,0 22,0 32,10 32,22 22,32 10,32 0,22 0,10" fill="none" stroke="url(#jmrGold)" stroke-width="2"/>
    <text x="16" y="21" font-family="serif" font-size="12" font-weight="700" fill="url(#jmrGold)" text-anchor="middle">JP</text>
  </g>
  <!-- Card name -->
  <text x="28" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="300" fill="rgba(200,170,70,0.9)" letter-spacing="5" text-transform="uppercase">RESERVE</text>
  <!-- JP Morgan wordmark -->
  <text x="28" y="190" font-family="serif" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="2">JP MORGAN</text>
  <!-- Card number dots -->
  <text x="28" y="220" font-family="monospace" font-size="11" fill="rgba(200,170,70,0.3)" letter-spacing="3">•••• •••• •••• ••••</text>
  <!-- Bottom gold line -->
  <rect x="0" y="240" width="400" height="2" fill="url(#jmrGold)" opacity="0.4"/>
</svg>
