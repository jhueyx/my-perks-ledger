<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="arBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#3A0000"/>
    </linearGradient>
    <linearGradient id="arBg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#600010"/>
      <stop offset="100%" stop-color="#1A0000"/>
    </linearGradient>
    <radialGradient id="arSheen" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#A01020" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#arBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#arBg2)" opacity="0.5"/>
  <rect width="400" height="252" rx="16" fill="url(#arSheen)"/>
  <!-- US Bank shield/logo (simplified) -->
  <g transform="translate(28, 24)" opacity="0.85">
    <path d="M 20 0 L 40 8 L 40 30 Q 40 44 20 52 Q 0 44 0 30 L 0 8 Z" fill="none" stroke="rgba(255,160,140,0.8)" stroke-width="1.8"/>
    <text x="20" y="34" font-family="sans-serif" font-size="18" font-weight="700" fill="rgba(255,160,140,0.8)" text-anchor="middle">US</text>
  </g>
  <!-- Mountain silhouette (altitude theme) -->
  <g opacity="0.1" fill="white">
    <polygon points="300,130 340,60 380,130"/>
    <polygon points="330,130 360,80 400,130"/>
    <polygon points="270,130 310,90 350,130"/>
  </g>
  <!-- US Bank Altitude wordmark -->
  <text x="28" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" letter-spacing="2" opacity="0.9">U.S. BANK</text>
  <text x="28" y="192" font-family="system-ui" font-size="10" font-weight="300" fill="rgba(255,160,140,0.7)" letter-spacing="4">ALTITUDE RESERVE</text>
  <!-- Card number dots -->
  <text x="28" y="222" font-family="monospace" font-size="11" fill="rgba(255,160,140,0.25)" letter-spacing="3">•••• •••• •••• ••••</text>
  <text x="28" y="242" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.25)" letter-spacing="1">VISA INFINITE</text>
</svg>
