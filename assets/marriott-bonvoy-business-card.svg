<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="mbbizBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A0000"/>
      <stop offset="100%" stop-color="#380000"/>
    </linearGradient>
    <radialGradient id="mbbizSheen" cx="25%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#C03030" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#380000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#mbbizBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#mbbizSheen)"/>
  <!-- Marriott M logo -->
  <g transform="translate(28, 24)" opacity="0.85">
    <path d="M0 40 L0 0 L20 28 L40 0 L40 40" fill="none" stroke="rgba(255,200,180,0.9)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- Subtle diagonal accent -->
  <line x1="0" y1="140" x2="140" y2="0" stroke="#C04040" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="180" x2="180" y2="50" stroke="#C04040" stroke-width="0.6" opacity="0.15"/>
  <!-- Marriott wordmark -->
  <text x="28" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="white" letter-spacing="2" opacity="0.9">MARRIOTT BONVOY</text>
  <text x="28" y="192" font-family="system-ui" font-size="11" font-weight="300" fill="rgba(255,180,160,0.75)" letter-spacing="5">BUSINESS</text>
  <!-- Card number dots -->
  <text x="28" y="222" font-family="monospace" font-size="11" fill="rgba(255,180,160,0.25)" letter-spacing="3">•••• •••• •••• ••••</text>
  <text x="28" y="242" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.25)" letter-spacing="1">AMERICAN EXPRESS</text>
</svg>
