<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="biltBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C2535"/>
      <stop offset="100%" stop-color="#0D1520"/>
    </linearGradient>
    <radialGradient id="biltSheen" cx="75%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#2A3D5A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0D1520" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#biltBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#biltSheen)"/>
  <!-- Bilt "B" wordmark (stylized) -->
  <g transform="translate(28, 28)">
    <text font-family="Georgia, serif" font-size="38" font-weight="700" fill="white" opacity="0.9">B</text>
  </g>
  <!-- Geometric accent lines -->
  <line x1="0" y1="80" x2="200" y2="80" stroke="#3A5070" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="84" x2="120" y2="84" stroke="#3A5070" stroke-width="0.5" opacity="0.25"/>
  <!-- BILT wordmark -->
  <text x="28" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="8" opacity="0.9">BILT</text>
  <!-- Mastercard hint -->
  <text x="28" y="190" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="2">WORLD ELITE MASTERCARD</text>
  <!-- Card number dots -->
  <text x="28" y="220" font-family="monospace" font-size="11" fill="rgba(160,180,200,0.3)" letter-spacing="3">•••• •••• •••• ••••</text>
  <!-- Subtle building silhouette (Bilt theme: real estate) -->
  <g opacity="0.08" transform="translate(300, 60)">
    <rect x="15" y="30" width="30" height="50" fill="white"/>
    <rect x="10" y="20" width="40" height="15" fill="white"/>
    <rect x="0" y="50" width="15" height="30" fill="white"/>
    <rect x="45" y="50" width="15" height="30" fill="white"/>
  </g>
</svg>
