<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="agBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A5C38"/>
      <stop offset="100%" stop-color="#0D3420"/>
    </linearGradient>
    <radialGradient id="agSheen" cx="25%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2A8C50" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0D3420" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#agBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#agSheen)"/>
  <!-- AMEX Centurion (simplified) -->
  <g transform="translate(300, 20)" opacity="0.35">
    <ellipse cx="30" cy="50" rx="28" ry="44" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="14" y1="14" x2="46" y2="14" stroke="white" stroke-width="1.5"/>
    <line x1="30" y1="8" x2="30" y2="94" stroke="white" stroke-width="1"/>
    <circle cx="30" cy="52" r="10" fill="none" stroke="white" stroke-width="1.2"/>
  </g>
  <!-- Diagonal texture lines -->
  <line x1="0" y1="180" x2="180" y2="0" stroke="#2A8C50" stroke-width="0.8" opacity="0.15"/>
  <line x1="40" y1="200" x2="200" y2="40" stroke="#2A8C50" stroke-width="0.5" opacity="0.1"/>
  <!-- AMEX Green wordmark -->
  <text x="28" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="3" opacity="0.9">AMERICAN EXPRESS</text>
  <text x="28" y="198" font-family="system-ui" font-size="14" font-weight="300" fill="rgba(160,220,180,0.8)" letter-spacing="6">GREEN</text>
  <!-- Card number dots -->
  <text x="28" y="225" font-family="monospace" font-size="11" fill="rgba(160,220,180,0.3)" letter-spacing="3">•••• •••• •••• ••••</text>
</svg>
