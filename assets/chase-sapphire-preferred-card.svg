<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="cspBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#0D2240"/>
    </linearGradient>
    <radialGradient id="cspSheen" cx="20%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#2A5A8C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0D2240" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#cspBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#cspSheen)"/>
  <!-- Sapphire gem motif (simplified) -->
  <g transform="translate(28, 28)" opacity="0.85">
    <polygon points="18,0 36,12 36,30 18,42 0,30 0,12" fill="none" stroke="#6AABF0" stroke-width="1.5"/>
    <polygon points="18,8 28,14 28,26 18,32 8,26 8,14" fill="#1A5A9A" stroke="#6AABF0" stroke-width="1"/>
    <polygon points="18,14 24,18 24,24 18,28 12,24 12,18" fill="#3A7AC8"/>
  </g>
  <!-- Horizontal shimmer lines -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="#2A5A8C" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#2A5A8C" stroke-width="0.3" opacity="0.2"/>
  <!-- Card name -->
  <text x="28" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="white" letter-spacing="1" opacity="0.9">SAPPHIRE</text>
  <text x="28" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="300" fill="rgba(106,171,240,0.8)" letter-spacing="4">PREFERRED</text>
  <!-- Card number dots -->
  <text x="28" y="222" font-family="monospace" font-size="11" fill="rgba(106,171,240,0.3)" letter-spacing="3">•••• •••• •••• ••••</text>
  <!-- Chase wordmark area -->
  <text x="28" y="242" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)" letter-spacing="2">CHASE</text>
</svg>
