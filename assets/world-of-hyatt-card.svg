<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="hyattBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4A34"/>
      <stop offset="100%" stop-color="#082018"/>
    </linearGradient>
    <radialGradient id="hyattSheen" cx="25%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2A7A50" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#082018" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#hyattBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#hyattSheen)"/>
  <!-- Hyatt H logo (stylized) -->
  <g transform="translate(28, 24)" fill="none" stroke="rgba(160,230,180,0.85)" stroke-width="2.5" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="38"/>
    <line x1="22" y1="0" x2="22" y2="38"/>
    <line x1="0" y1="19" x2="22" y2="19"/>
  </g>
  <!-- Leaf/nature accent (Hyatt brand) -->
  <g opacity="0.12" transform="translate(300, 20)">
    <ellipse cx="30" cy="50" rx="25" ry="42" fill="none" stroke="white" stroke-width="1.5" transform="rotate(-20, 30, 50)"/>
    <ellipse cx="30" cy="50" rx="25" ry="42" fill="none" stroke="white" stroke-width="1" transform="rotate(20, 30, 50)"/>
  </g>
  <!-- Hyatt wordmark -->
  <text x="28" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="white" letter-spacing="4" opacity="0.9">HYATT</text>
  <text x="28" y="192" font-family="system-ui" font-size="10" font-weight="300" fill="rgba(160,230,180,0.7)" letter-spacing="4">WORLD OF HYATT</text>
  <!-- Card number dots -->
  <text x="28" y="222" font-family="monospace" font-size="11" fill="rgba(160,230,180,0.25)" letter-spacing="3">•••• •••• •••• ••••</text>
  <text x="28" y="242" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.25)" letter-spacing="1">CHASE</text>
</svg>
