<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="mbbBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A1040"/>
      <stop offset="100%" stop-color="#2A0418"/>
    </linearGradient>
    <radialGradient id="mbbSheen" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#A03060" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2A0418" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mbbSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#DDD"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#mbbBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#mbbSheen)"/>
  <!-- Marriott M logo (simplified) -->
  <g transform="translate(28, 24)" opacity="0.9">
    <path d="M0 40 L0 0 L20 28 L40 0 L40 40" fill="none" stroke="url(#mbbSilver)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- Radial light effect -->
  <circle cx="200" cy="126" r="120" fill="none" stroke="rgba(180,80,100,0.1)" stroke-width="30"/>
  <circle cx="200" cy="126" r="80" fill="none" stroke="rgba(180,80,100,0.08)" stroke-width="20"/>
  <!-- Marriott wordmark -->
  <text x="28" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="white" letter-spacing="2" opacity="0.9">MARRIOTT BONVOY</text>
  <text x="28" y="192" font-family="system-ui" font-size="12" font-weight="300" fill="rgba(220,160,180,0.8)" letter-spacing="5">BRILLIANT</text>
  <!-- Card number dots -->
  <text x="28" y="222" font-family="monospace" font-size="11" fill="rgba(220,160,180,0.25)" letter-spacing="3">•••• •••• •••• ••••</text>
  <text x="28" y="242" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.25)" letter-spacing="1">AMERICAN EXPRESS</text>
</svg>
