<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="ucBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E2050"/>
      <stop offset="100%" stop-color="#040A22"/>
    </linearGradient>
    <linearGradient id="ucSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#707070"/>
      <stop offset="50%" stop-color="#C8C8C8"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <radialGradient id="ucSheen" cx="30%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#1A3080" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#040A22" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#ucBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#ucSheen)"/>
  <!-- Silver accent bar -->
  <rect x="0" y="38" width="400" height="2" fill="url(#ucSilver)" opacity="0.7"/>
  <!-- United globe logo -->
  <g transform="translate(28, 52)" opacity="0.85">
    <circle cx="22" cy="22" r="20" fill="none" stroke="url(#ucSilver)" stroke-width="1.8"/>
    <ellipse cx="22" cy="22" rx="10" ry="20" fill="none" stroke="url(#ucSilver)" stroke-width="1.2"/>
    <line x1="2" y1="22" x2="42" y2="22" stroke="url(#ucSilver)" stroke-width="1.2"/>
    <line x1="5" y1="12" x2="39" y2="12" stroke="url(#ucSilver)" stroke-width="0.8"/>
    <line x1="5" y1="32" x2="39" y2="32" stroke="url(#ucSilver)" stroke-width="0.8"/>
  </g>
  <!-- United Club wordmark -->
  <text x="28" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="3" opacity="0.9">UNITED</text>
  <text x="28" y="192" font-family="system-ui" font-size="10" font-weight="300" fill="rgba(200,200,210,0.7)" letter-spacing="4">CLUB INFINITE</text>
  <!-- Card number dots -->
  <text x="28" y="222" font-family="monospace" font-size="11" fill="rgba(180,190,220,0.25)" letter-spacing="3">•••• •••• •••• ••••</text>
  <text x="28" y="242" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.25)" letter-spacing="1">CHASE</text>
  <!-- Silver bottom accent -->
  <rect x="0" y="248" width="400" height="2" fill="url(#ucSilver)" opacity="0.5"/>
</svg>
