<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 252" width="400" height="252">
  <defs>
    <linearGradient id="hhBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001A4A"/>
      <stop offset="100%" stop-color="#000A28"/>
    </linearGradient>
    <linearGradient id="hhGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8902A"/>
      <stop offset="50%" stop-color="#E8C060"/>
      <stop offset="100%" stop-color="#B8902A"/>
    </linearGradient>
    <radialGradient id="hhSheen" cx="60%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#0A3080" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000A28" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="252" rx="16" fill="url(#hhBg)"/>
  <rect width="400" height="252" rx="16" fill="url(#hhSheen)"/>
  <!-- Gold top accent -->
  <rect x="0" y="0" width="400" height="4" rx="0" fill="url(#hhGold)" opacity="0.8"/>
  <!-- H logo (Hilton) -->
  <g transform="translate(28, 28)" fill="none">
    <line x1="0" y1="0" x2="0" y2="36" stroke="url(#hhGold)" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="0" x2="18" y2="36" stroke="url(#hhGold)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="18" y2="18" stroke="url(#hhGold)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Star field -->
  <g opacity="0.4">
    <circle cx="320" cy="30" r="1.5" fill="#E8C060"/>
    <circle cx="350" cy="55" r="1" fill="#E8C060"/>
    <circle cx="370" cy="25" r="2" fill="#E8C060"/>
    <circle cx="340" cy="80" r="1.2" fill="#E8C060"/>
    <circle cx="385" cy="60" r="1.5" fill="#E8C060"/>
    <circle cx="360" cy="100" r="0.9" fill="#E8C060"/>
  </g>
  <!-- Hilton wordmark -->
  <text x="28" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="300" fill="white" letter-spacing="5" opacity="0.9">HILTON</text>
  <text x="28" y="192" font-family="system-ui" font-size="10" font-weight="400" fill="rgba(232,192,96,0.7)" letter-spacing="4">HONORS ASPIRE</text>
  <!-- Card number dots -->
  <text x="28" y="222" font-family="monospace" font-size="11" fill="rgba(232,192,96,0.25)" letter-spacing="3">•••• •••• •••• ••••</text>
  <!-- AMEX small text -->
  <text x="28" y="242" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.25)" letter-spacing="1">AMERICAN EXPRESS</text>
  <!-- Gold bottom accent -->
  <rect x="0" y="248" width="400" height="4" rx="0" fill="url(#hhGold)" opacity="0.6"/>
</svg>
